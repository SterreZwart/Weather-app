<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Weather app</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&family=DM+Sans:ital,wght@0,300;0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo keep-me">
        <img src="./assets/images/logo.svg" alt="Weather Now Logo">
      </div>

<!--//search-->
      <div class="search-section">
        <h1 class="title">How's the sky looking today?</h1>
        <form id="search-form" class="search-form">
          <div class="input-group">
            <img src="./assets/images/icon-search.svg" alt="" class="search-icon">
            <input type="text" id="location-search" placeholder="Search for a place..." aria-label="Search for a place">
            <button type="button" id="locate-btn" class="locate-btn" title="Use my current location">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
              </svg>
            </button>
          </div>
          <ul id="search-suggestions" class="suggestions-list" hidden></ul>
        </form>
      </div>


<!--//settings-->
      <div class="settings keep-me">
        <div class="unit-toggle">
          <button id="units-toggle-btn" class="units-btn">
            <img src="./assets/images/icon-units.svg" alt="">
            <span>Units</span>
            <img src="./assets/images/icon-dropdown.svg" alt="" class="dropdown-icon">
          </button>
          <div id="unit-menu" class="unit-menu" hidden>
            <button id="celsius-button" class="unit-option active">Metric (Celsius, km/h)</button>
            <button id="fahrenheit-button" class="unit-option">Imperial (Fahrenheit, mph)</button>
          </div>
        </div>
      </div>
    </header>


<!--//main-->
    <main class="main-content keep-me">
      <div class="weather-dashboard">
        <section class="current-weather-section">
          <div class="current-card">
            <div class="card-info">
              <h2 id="current-location" class="location-name">Berlin, Germany</h2>
              <p id="current-date" class="current-date">Tuesday, Aug 5, 2025</p>
            </div>
            <div class="card-temp">
              <img id="weather-icon" src="./assets/images/icon-sunny.webp" alt="Weather Icon" class="main-icon">
</div>
<div class=tempp>
              <div class="temp-wrapper">
                <span id="temperature-value" class="temp-val">20</span><span class="degree-symbol">°</span>
              </div>
            </div>
</div>
              <!--<p id="weather-description" class="weather-desc">Clear sky</p>  remove-->

          

          <div class="weather-details">
            <div class="detail-item">
              <span class="detail-label">Feels Like</span>
              <span id="feels-like" class="detail-value">18°</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Humidity</span>
              <span id="humidity" class="detail-value">46%</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Wind</span>
              <span id="wind-speed" class="detail-value">14 km/h</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Precipitation</span>
              <span id="precipitation" class="detail-value">0 mm</span>
            </div>
          </div>
        </section>

        <section class="forecast-section">
          <h3>Hourly forecast</h3>
          <div id="hourly-forecast-container" class="forecast-content hourly-grid">
            <!-- Hourly items will be injected here -->
          </div>
        </section>

<section class=daily-forecast-section>
       <div id=daily-forecast-container class=daily-forecast>
         <h1 class=daily-fc-title>Daily forecast</h1>
       </div>
       <div id=daily-forecast-container2 class="forecast-content2 daily-grid">
<!-- daily items ahould be injected here, fix that-->
       </div>
</section>

      </div>

    </main>
    <!-- State containers -->
    <div id="loading-state" class="state-container" hidden>
      <img src="./assets/images/icon-loading.svg" alt="Loading" class="loading-spinner">
      <p>Loading weather data...</p>
    </div>

        <div id="error-state" class="state-container" hidden>
      <img src="./assets/images/icon-error.svg" alt="Error" width= 40px>
      <p id="error-message">Something went wrong.</p>
      <button id="retry-button" class="retry-btn">
        <img src="./assets/images/icon-retry.svg" alt="">
        Retry
      </button>
    </div>

   <div id="no-results-state" class="state-container" hidden>
      <img src="./assets/images/icon-search.svg" alt="No results">
      <p>No results found for "<span id="search-query-display"></span>".</p>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
